<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Voyager AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #020617;
      color: white;
      font-family: 'Inter', sans-serif;
    }

    @keyframes pulse-scan {
      0% {
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.8), 0 0 10px rgba(34, 211, 238, 0.4);
      }

      70% {
        box-shadow: 0 0 0 20px rgba(34, 211, 238, 0), 0 0 20px rgba(34, 211, 238, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0), 0 0 0 0 rgba(34, 211, 238, 0);
      }
    }

    @keyframes glow-spread {

      0%,
      100% {
        filter: brightness(1) drop-shadow(0 0 5px rgba(34, 211, 238, 0.5));
      }

      50% {
        filter: brightness(1.5) drop-shadow(0 0 15px rgba(34, 211, 238, 1));
      }
    }

    .poi-pulse {
      animation: pulse-scan 2s infinite, glow-spread 3s ease-in-out infinite;
    }

    @keyframes scanline {
      0% {
        transform: translateY(-100%);
      }

      100% {
        transform: translateY(100vh);
      }
    }

    .scanline {
      width: 100%;
      height: 3px;
      background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.2), transparent);
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 40;
      animation: scanline 6s linear infinite;
    }

    @keyframes progress-scan {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }
  </style>
